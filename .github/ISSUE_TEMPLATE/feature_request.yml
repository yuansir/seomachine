name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make SEO Machine better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem does this feature solve? Describe your current workflow pain point.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical — blocking my use of the tool
        - High — would significantly improve my workflow
        - Medium — nice to have
        - Low — minor quality-of-life improvement
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any screenshots, mockups, links, or other context.
